name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  claude-review:
    name: Review PR with Claude
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Claude review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Review este PR del codebase Finify (app de finanzas personales,
            Next.js 16 App Router + React 19 + TypeScript strict + Tailwind v4
            + shadcn/ui, paleta monocromática oklch, Supabase Auth + Postgres
            con RLS por user_id, TanStack Query, react-hook-form + Zod).

            Convenciones del proyecto:
            - Server Components por default; Client Components solo cuando hay estado/efectos.
            - Server Actions sobre API routes para mutaciones; envelope ActionResult.
            - Validación con Zod en bordes (entrada de actions, fetchers externos).
            - Sin `any` implícito ni explícito.
            - Sin colores hardcoded; usar tokens del design system (oklch hue=0)
              o utilidades de Tailwind (text-green-600 / text-red-600) solo para
              indicadores semánticos (income/expense/profit/loss).
            - Conventional commits.
            - DB con datos sensibles en producción: cualquier cambio de schema
              debe ser aditivo, reversible y probado en branch Supabase primero.

            Focos de review:
            - Correctness y type safety (estrechar tipos, evitar `as` innecesarios).
            - Seguridad: secrets, RLS por user_id, validación de entrada en server actions.
            - Performance: client/server boundary, evitar refetch innecesarios,
              memoization solo si justifica.
            - Errores: manejo en bordes únicamente, no defensivo.
            - Multi-moneda: respetar la moneda base del usuario y la conversión FX.

            Sé conciso. Reportá issues concretos con `file:line`. No felicites, no comentes nits.
            Si el PR está limpio, decilo en una línea.
