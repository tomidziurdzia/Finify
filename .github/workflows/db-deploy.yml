name: Deploy database migrations

# Pushes any pending migrations to the linked Supabase project once they
# merge to main. The job is idempotent: `supabase db push` only applies
# migrations that aren't yet recorded in
# `supabase_migrations.schema_migrations`, so re-running is safe.
#
# Required GitHub repo secrets (Settings → Secrets and variables → Actions):
#   SUPABASE_ACCESS_TOKEN  — personal access token from
#                            https://supabase.com/dashboard/account/tokens
#   SUPABASE_PROJECT_ID    — the 20-char ref of the production project
#                            (Settings → General → Reference ID)
#   SUPABASE_DB_PASSWORD   — the postgres user password set when the
#                            project was created (NOT the JWT secret)
#
# Until those secrets are configured the job fails fast with a clear
# message; no destructive action is taken.

on:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
      - ".github/workflows/db-deploy.yml"
  workflow_dispatch:

concurrency:
  group: db-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Bail out if secrets are missing
        run: |
          if [ -z "${SUPABASE_ACCESS_TOKEN}" ] \
             || [ -z "${SUPABASE_PROJECT_ID}" ] \
             || [ -z "${SUPABASE_DB_PASSWORD}" ]; then
            echo "::error::Missing one or more Supabase secrets. Configure SUPABASE_ACCESS_TOKEN, SUPABASE_PROJECT_ID, SUPABASE_DB_PASSWORD."
            exit 1
          fi

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"

      - name: Push migrations
        run: supabase db push --include-all
